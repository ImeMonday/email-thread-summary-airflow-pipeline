x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__LAZY_LOAD_PLUGINS: "True"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags

    # Fix: webserver takes longer to boot on Windows volume mounts
    AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
    AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"

    # Optional: reduce load
    AIRFLOW__WEBSERVER__WORKERS: "1"

    # Minimal deps for now
    _PIP_ADDITIONAL_REQUIREMENTS: "${_PIP_ADDITIONAL_REQUIREMENTS:-psycopg2-binary}"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ../../extraction/email_thread_summary:/opt/airflow/projects/email_thread_summary
  user: "${AIRFLOW_UID:-50000}:0"

services:
  airflow-db:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - airflow_db_data:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
    depends_on:
      airflow-db:
        condition: service_healthy
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate &&
          airflow users create --username ${AIRFLOW_ADMIN_USER:-admin} --password ${AIRFLOW_ADMIN_PASSWORD:-admin} --firstname Admin --lastname User --role Admin --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "600"
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "600"
      AIRFLOW__WEBSERVER__WORKERS: "1"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "8080:8080"

  airflow-scheduler:
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

  dev-target-db:
    image: postgres:15
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: devdb
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d devdb"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - dev_target_db_data:/var/lib/postgresql/data

volumes:
  airflow_db_data:
  dev_target_db_data:
